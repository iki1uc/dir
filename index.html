<script type="module">
  import { createInstanz } from "./instanz-factory.js";
  import { Ghost } from "./ghost-core.js";
  import { mir } from "./mir-core.js";
  import { argumenteria } from "./argumenteria-core.js";
  import { dir } from "./dir-core.js";
  import { Realm } from "./realm-core.js";

  // Instanzen erzeugen
  const i1 = createInstanz("INST-01");
  const i2 = createInstanz("INST-02");
  const i3 = createInstanz("INST-03");

  // Ghost erzeugen
  const ghost = Ghost([i1, i2, i3]);

  // Realm erzeugen
  const realm = Realm([i1, i2, i3], ghost, mir, argumenteria, dir);

  // Tick ausführen
  const result = realm.tick("Hallo Realm!");

  document.getElementById("respo").textContent = JSON.stringify(result, null, 2);
</script>
