<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>DIR-System Neu</title>
</head>

<body>

  <h2>NC-RESPO Ausgabe:</h2>
  <div id="respo"></div>

  <h2>DIR Ausgabe:</h2>
  <div id="dir"></div>

  <script type="module">
    import { Instanz } from "./instanz-core.js";
    import { ncRespo } from "./ncrespo-core.js";
    import { dir } from "./dir-core.js";

    // Neue ROOT + NC Instanz
    const core = Instanz(213, "GATE-A", "SAT-OK", "ANKER-ROOT");

    // Neue RESPO-Version
    const r = ncRespo(core);

    // DIR verarbeitet ncRespo
    const d = dir(r);

    // Ausgabe
    document.getElementById("respo").textContent = r;
    document.getElementById("dir").textContent   = d;
  </script>

</body>
</html>
